filebeat.inputs:
  - type: filestream
    id: suricata-eve
    paths:
      - /opt/homebrew/var/log/suricata/eve.json
    parsers:
      - ndjson:
          target: ""
          add_error_key: true

output.elasticsearch:
  hosts: ["http://localhost:9200"]
  index: "cyberwatch-alerts"

setup.ilm.enabled: false
setup.template.enabled: false
